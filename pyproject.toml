[project]
name = "takt"
version = "0.1.0"
description = "Generyczny silnik kaskadowego przetwarzania hierarchicznego (cybernetyka / teoria systemów autonomicznych). Transport pionowy via fala, fuzja via splot."
readme = "README.md"
authors = [
  { name = "mikolaj92", email = "mikolaj92@users.noreply.github.com" }
]
requires-python = ">=3.13"
license = "MIT"
dependencies = [
  "fala-runtime",
  "splot-runtime",
  "pydantic>=2.13.4",
  "typing-extensions>=4",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.1.1",
  "pytest-cov>=5",
  "mypy>=1.10",
  "ruff>=0.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/takt"]

[tool.uv.sources]
fala-runtime = { git = "https://github.com/mikolaj92/fala.git" }
splot-runtime = { git = "https://github.com/mikolaj92/splot.git" }

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-q --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[project.urls]
Homepage = "https://github.com/mikolaj92/takt"
Repository = "https://github.com/mikolaj92/takt"
Issues = "https://github.com/mikolaj92/takt/issues"
